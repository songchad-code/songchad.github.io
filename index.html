<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONG CHAD | Official Links</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #ffffff;
            --text-sub: #8b949e;
            --accent-green: #00ffa3;
            --accent-blue: #00d1ff;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Apple SD Gothic Neo', sans-serif; margin: 0; display: flex; justify-content: center; padding: 40px 20px; }
        .wrapper { width: 100%; max-width: 480px; text-align: center; }
        
        /* 프로필 섹션 */
        .profile-img { width: 100px; height: 100px; background: linear-gradient(135deg, var(--accent-green), var(--accent-blue)); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; color: #000; }
        h1 { font-size: 1.5rem; margin: 10px 0 5px; }
        .id { color: var(--accent-green); font-size: 0.9rem; margin-bottom: 10px; display: block; }
        .bio { font-size: 0.9rem; color: var(--text-sub); line-height: 1.5; margin-bottom: 30px; }

        /* 그룹 타이틀 */
        .group-title { text-align: left; font-size: 0.85rem; color: var(--text-sub); margin: 25px 0 10px 10px; display: flex; align-items: center; gap: 8px; }

        /* 링크 카드 */
        .link-card { 
            background: var(--card-bg); border: 1px solid #30363d; border-radius: 16px; 
            padding: 20px; margin-bottom: 12px; display: flex; align-items: center; 
            text-decoration: none; color: inherit; transition: 0.2s; position: relative; overflow: hidden;
        }
        .link-card:hover { transform: translateY(-3px); border-color: #484f58; background: #1c2128; }
        
        /* 강조 카드 (그라데이션 테두리) */
        .featured { border: 2px solid transparent; background-image: linear-gradient(var(--card-bg), var(--card-bg)), linear-gradient(to right, var(--accent-green), var(--accent-blue)); background-origin: border-box; background-clip: content-box, border-box; }

        .icon { width: 40px; height: 40px; background: #21262d; border-radius: 12px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .content { text-align: left; flex-grow: 1; }
        .content h3 { font-size: 1rem; margin: 0; }
        .content p { font-size: 0.8rem; color: var(--text-sub); margin: 3px 0 0; }
        .arrow { color: var(--text-sub); font-size: 1.2rem; }

        /* 뱃지 */
        .badge { position: absolute; top: 10px; right: 15px; font-size: 0.7rem; font-weight: bold; padding: 2px 8px; border-radius: 10px; }
        .badge-free { background: #238636; color: #ffffff; }
        .badge-new { background: #1f6feb; color: #ffffff; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="profile-img">SC</div>
        <h1>성공팔이 송차드</h1>
        <span class="id">@songchad_official</span>
        <p class="bio">5년 차 전업 트레이더 · 자본주의 생존 전문가<br>실전 매매 전략 · 계좌 수익 인증 · 기부 프로젝트</p>

        <div class="group-title">💬 커뮤니티 & 문의</div>
        <a href="#" class="link-card">
            <div class="icon">📢</div>
            <div class="content">
                <h3>정보공유방 입장</h3>
                <p>송차드 공식 텔레그램 채널</p>
            </div>
            <div class="arrow">→</div>
        </a>
        <a href="#" class="link-card">
            <div class="icon">💬</div>
            <div class="content">
                <h3>1:1 개인 메시지</h3>
                <p>비즈니스 문의 및 매매 아이디어 공유</p>
            </div>
            <div class="arrow">→</div>
        </a>

        <div class="group-title">📊 도구 & 채널</div>
        <a href="#" class="link-card featured">
            <span class="badge badge-free">무료</span>
            <div class="icon">📈</div>
            <div class="content">
                <h3>무료 인디케이터 받기</h3>
                <p>트레이딩뷰 송차드 전용 지표</p>
            </div>
            <div class="arrow">→</div>
        </a>
        <a href="#" class="link-card featured">
            <span class="badge badge-new">신규</span>
            <div class="icon">📘</div>
            <div class="content">
                <h3>거시경제 마스터 전자책</h3>
                <p>유동성의 흐름을 읽는 법 (PDF)</p>
            </div>
            <div class="arrow">→</div>
        </a>
        <a href="#" class="link-card">
            <div class="icon">🎬</div>
            <div class="content">
                <h3>유튜브 채널</h3>
                <p>매매 브이로그 및 실시간 트레이딩</p>
            </div>
            <div class="arrow">→</div>
        </a>
    </div>
</body>
</html>
